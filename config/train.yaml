data:
  data_dir: "data/raw"
  img_size: [384, 384] # Возвращаем 384, это родное разрешение для весов convnext
  crop_bbox: true
  num_workers: 4

model:
  name: "convnext_small.fb_in22k_ft_in1k_384" # Переключаем на твоего лидера
  pretrained: true
  drop_rate: 0.5      # 🔥 Усиливаем обычный Dropout (было 0.3)
  init_bias: 2.88  

train:
  loss_name: "wing"    # 🔥 Проверяем Wing Loss против Smooth L1
  batch_size: 16       # Если будет падать по памяти (OOM), снизь до 8
  epochs: 30
  lr: 5.0e-5           # Оставляем этот стабильный LR
  weight_decay: 0.08   # 🔥 Усиливаем L2-регуляризацию (было 0.05)
  warmup_epochs: 5    
  patience: 10
  save_dir: "checkpoints"
  use_wandb: true
  wandb_project: "cow_bcs"
  wandb_name: "run_03_convnext_wing_reg"
  mixup_alpha: 0.0